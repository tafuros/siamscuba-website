    <!-- Paint the very first frame ocean-blue (matches the hero's bg-ocean-deep)
         so page load / reload eases into the dark hero instead of flashing white.
         Inline + before the app stylesheet so it applies on the earliest paint. -->
    <meta name="theme-color" content="#0a335c" />
    <style>
      html{background-color:#0a335c}
      /* Pre-React gate cover poster framing - must match .gate-photo-bg in
         seascape/gate styles exactly so the background does not jump when the
         React gate mounts over it. */
      #gate-preload-cover>img{object-position:50% 42%}
      @media (max-width:767px){#gate-preload-cover>img{object-position:50% 38%}}
    </style>
    <!-- Entry gate: paint an instant deep-ocean cover BEFORE the homepage body
         renders, so a hard reload eases straight into the gate instead of
         flashing the live site for a few frames. Gated by the build flag (no-op
         when the gate is off), only on "/", skipped with ?gate=0. The gate removes
         it on enter; a safety timeout removes it if the gate never loads. -->
    <script>
      (function () {
        try {
          // Will the entry gate show on this load? (build flag on + homepage +
          // not ?gate=0 + not seen in the last 7 days). Stashed so the hero-image
          // preload below can skip itself when the gate covers the hero -
          // otherwise the 182KB hero competes with the gate poster/video for the
          // first bandwidth on mobile. The "seen" window must match GATE_SEEN_TTL
          // in EntryGate.tsx so the cover and the gate agree.
          var seen = false;
          try {
            var t = Number(localStorage.getItem("siam_gate_seen"));
            seen = t > 0 && Date.now() - t < 604800000; // 7 days
          } catch (e) {}
          window.__siamGate =
            "%VITE_ENTRY_GATE%" === "on" &&
            location.pathname === "/" &&
            new URLSearchParams(location.search).get("gate") !== "0" &&
            !seen;
          if (!window.__siamGate) return;
          var c = document.createElement("div");
          c.id = "gate-preload-cover";
          c.setAttribute("aria-hidden", "true");
          c.style.cssText =
            "position:fixed;inset:0;z-index:99;background:linear-gradient(to bottom,#1f73ab 0%,#2f8cc4 34%,#3a9bd2 60%,#15659c 80%,#0c4f80 100%)";
          // Paint the poster as a real <img> in the pre-React cover. The gate is a
          // client-rendered overlay, so without this the first real frame (and the
          // LCP) waits for the JS bundle + GTM to execute and React to mount - ~11s
          // on throttled mobile. As an <img> in the instant cover it is the LCP and
          // paints as soon as the (preloaded) poster decodes. The React gate mounts
          // the same poster/video on top, so the handoff is seamless.
          var im = document.createElement("img");
          im.src = "/gate/gate-poster.jpg";
          im.alt = "";
          im.setAttribute("aria-hidden", "true");
          im.setAttribute("fetchpriority", "high");
          im.decoding = "async";
          // object-position is set via the #gate-preload-cover stylesheet rule
          // below so it can be responsive and exactly match the React gate's
          // .gate-photo-bg framing (no vertical jump when React takes over).
          im.style.cssText =
            "position:absolute;inset:0;width:100%;height:100%;object-fit:cover";
          c.appendChild(im);
          (document.body || document.documentElement).appendChild(c);
          // Also preload it so the fetch starts before this script appends the img.
          var p = document.createElement("link");
          p.rel = "preload"; p.as = "image"; p.href = "/gate/gate-poster.jpg";
          p.setAttribute("fetchpriority", "high");
          document.head.appendChild(p);
          setTimeout(function () { var e = document.getElementById("gate-preload-cover"); if (e) e.remove(); }, 6000);
        } catch (e) { window.__siamGate = false; }
      })();
    </script>

    <!--
      Self-hosted fonts (see src/fonts.css). Preload ONLY the hero <h1> weight
      (Playfair Display 700, latin) so it downloads same-origin in the first
      wave - this is the file the LCP was waiting on. Other weights/subsets
      load from the bundled @font-face on demand. as=font preload requires the
      crossorigin attribute even same-origin (fonts fetch in CORS mode).
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/playfair-700-latin.woff2"
      crossorigin
    />

    <!--
      LCP hero preload. Mirrors the <picture> sources in UnderwaterHero so the
      browser starts fetching the responsive hero image before JS parses, which
      moves LCP earlier on slower connections. Injected via JS and SKIPPED when
      the entry gate is showing (window.__siamGate) - the gate hides the hero, so
      preloading it there only steals bandwidth from the gate poster/video.
      Update the srcsets here if the hero changes.
    -->
    <script>
      (function () {
        try {
          if (window.__siamGate) return; // gate covers the hero; don't preload it
          var add = function (type, srcset) {
            var l = document.createElement("link");
            l.rel = "preload"; l.as = "image"; l.type = type;
            l.imageSrcset = srcset; l.imageSizes = "100vw";
            l.setAttribute("fetchpriority", "high");
            document.head.appendChild(l);
          };
          add("image/avif", "/hero/turtle-768.avif 768w, /hero/turtle-1280.avif 1280w, /hero/turtle-1920.avif 1920w");
          add("image/webp", "/hero/turtle-768.webp 768w, /hero/turtle-1280.webp 1280w, /hero/turtle-1920.webp 1920w");
        } catch (e) {}
      })();
    </script>

    <!-- Microsoft Clarity (heatmaps + session replay). Installed as a DIRECT
         snippet - NOT via GTM (we have no admin on container GTM-TN3SM66Q). The
         tag load is DEFERRED (fires on the visitor's first interaction or after
         3.5s, whichever is first) so ~40KB of replay JS stays off the critical
         path and does not regress the hard-won hero/gate LCP.

         Consent: cookieless-by-default, mirroring Google Consent Mode v2. We send
         Clarity's consentv2 signal with analytics_Storage/ad_Storage = denied on
         load, so Clarity records EVERY visitor in no-consent (cookieless) mode -
         it captures heatmaps/replay with a per-page-view id and sets NO cookies.
         When the visitor accepts cookies, CookieConsent.updateConsent() upgrades
         the signal to granted, enabling first-party cookies + cross-session
         stitching. __loadClarity re-reads the stored consent on load so a
         returning visitor who already accepted starts granted. (consentv2 is the
         current API; the older clarity('consent', bool) is deprecated AND would
         STOP tracking on denial - not what we want here.)

         The deferred trigger is purely ADDITIVE - it only appends Clarity's own
         script and never touches the app stylesheet or the eager GTM/Ads/Pixel
         tags above (unlike the reverted whole-page tag-defer). -->
    <script>
      window.__loadClarity = function () {
        if (window.__clarityLoaded) return;
        // Never load Clarity on local dev/preview - localhost sessions were
        // polluting the live project (xfh01pm237) as real recordings.
        if (/^(localhost|127\.0\.0\.1|\[::1\])$/.test(location.hostname)) return;
        window.__clarityLoaded = true;
        (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "xfh01pm237");
        // Cookieless by default; grant cookies only if the visitor already accepted.
        var granted = false;
        try { granted = localStorage.getItem("cookie_consent") === "granted"; } catch (e) {}
        var v = granted ? "granted" : "denied";
        window.clarity && window.clarity("consentv2", { ad_Storage: v, analytics_Storage: v });
      };
      (function () {
        var fired = false;
        var evs = ["pointerdown", "keydown", "touchstart", "scroll"];
        var opts = { passive: true };
        function fire() {
          if (fired) return; fired = true;
          evs.forEach(function (e) { window.removeEventListener(e, fire, opts); });
          clearTimeout(timer);
          if (window.__loadClarity) window.__loadClarity();
        }
        evs.forEach(function (e) { window.addEventListener(e, fire, opts); });
        var timer = setTimeout(fire, 3500);
      })();
    </script>
    <!-- End Microsoft Clarity -->
